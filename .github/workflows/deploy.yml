name: 5G Core CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── 1. Lint — syntax check all Python files ──────────────────────────────────
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --no-cache-dir \
            fastapi uvicorn numpy scikit-learn statsmodels joblib pydantic

      - name: Syntax check
        run: |
          python -m py_compile serving/api.py        && echo "serving/api.py OK"
          python -m py_compile automation/closed_loop.py && echo "automation/closed_loop.py OK"
          python -m py_compile scripts/analyze_phase6.py && echo "scripts/analyze_phase6.py OK"

  # ── 2. Smoke test — start FastAPI locally, hit all 3 endpoints ───────────────
  smoke-test:
    name: API Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --no-cache-dir \
            fastapi uvicorn numpy scikit-learn statsmodels joblib pydantic

      - name: Create stub models
        run: |
          mkdir -p /tmp/models
          python3 - <<'EOF'
          import json, joblib, numpy as np, warnings
          warnings.filterwarnings('ignore')
          from sklearn.ensemble import IsolationForest
          from sklearn.preprocessing import StandardScaler
          from sklearn.cluster import KMeans
          from sklearn.decomposition import PCA
          from statsmodels.tsa.arima.model import ARIMA

          d = '/tmp/models'

          m = IsolationForest(n_estimators=10, random_state=42).fit(np.zeros((20, 3)))
          joblib.dump(m, f'{d}/isolation_forest.pkl')
          joblib.dump(StandardScaler().fit(np.zeros((20, 3))), f'{d}/anomaly_scaler.pkl')
          json.dump({"model": "IsolationForest", "threshold": 0.6022,
                     "features": ["cpu_upf", "upf_replicas", "cpu_mongodb"],
                     "recall": 0.903, "fpr": 0.034, "precision": 0.7, "f1": 0.789},
                    open(f'{d}/anomaly_meta.json', 'w'))

          joblib.dump(KMeans(n_clusters=2, n_init=5, random_state=42).fit(np.zeros((20, 5))),
                      f'{d}/kmeans_model.pkl')
          joblib.dump(StandardScaler().fit(np.zeros((20, 19))), f'{d}/cluster_scaler.pkl')
          joblib.dump(PCA(n_components=5, random_state=42).fit(np.zeros((20, 19))),
                      f'{d}/cluster_pca.pkl')
          json.dump({"model": "KMeans", "k": 2, "pca_components": 5,
                     "pca_variance_pct": 75.2, "silhouette": 0.503,
                     "features": ["cpu_amf","cpu_ausf","cpu_bsf","cpu_gnb","cpu_mongodb",
                                  "cpu_nrf","cpu_nssf","cpu_pcf","cpu_scp","cpu_smf",
                                  "cpu_udm","cpu_udr","cpu_ue","cpu_upf","upf_replicas",
                                  "gtp_in_pps","gtp_out_pps","ran_ue_count","hpa_delta"],
                     "cluster_states": {"0": "HIGH-LOAD", "1": "IDLE"}},
                    open(f'{d}/clustering_meta.json', 'w'))

          joblib.dump(ARIMA(np.linspace(0, 1, 40), order=(3, 0, 1)).fit(),
                      f'{d}/arima_model.pkl')
          json.dump({"model": "ARIMA", "order": [3, 0, 1], "mape_percent": 3.644,
                     "rmse": 0.0929, "mae": 0.0728, "train_samples": 334, "test_samples": 84},
                    open(f'{d}/arima_meta.json', 'w'))
          print("Stub models OK")
          EOF

      - name: Start API server
        run: |
          cd serving
          MODEL_DIR=/tmp/models uvicorn api:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health >/dev/null 2>&1 && echo "Ready after ${i}s" && break
            sleep 1
          done

      - name: Test GET /health
        run: |
          curl -sf http://127.0.0.1:8000/health | python3 -m json.tool
          curl -s http://127.0.0.1:8000/health \
            | python3 -c "import sys,json; assert json.load(sys.stdin)['status']=='ok'"
          echo "HEALTH OK"

      - name: Test POST /predict/anomaly
        run: |
          curl -sf -X POST http://127.0.0.1:8000/predict/anomaly \
            -H "Content-Type: application/json" \
            -d '{"cpu_upf": 95.0, "upf_replicas": 5, "cpu_amf": 40.0}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'anomaly_score' in d"
          echo "ANOMALY OK"

      - name: Test POST /predict/cluster
        run: |
          curl -sf -X POST http://127.0.0.1:8000/predict/cluster \
            -H "Content-Type: application/json" \
            -d '{"cpu_upf": 20.0, "cpu_amf": 5.0, "upf_replicas": 1, "ue_count": 10}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'cluster_name' in d"
          echo "CLUSTER OK"
