name: 5G Core CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY:      ghcr.io
  IMAGE_SERVING: ghcr.io/${{ github.repository_owner }}/5g-serving-api
  IMAGE_LOOP:    ghcr.io/${{ github.repository_owner }}/5g-closed-loop

jobs:
  # ── 1. Lint & unit tests ────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install serving dependencies
        run: |
          pip install --no-cache-dir \
            fastapi uvicorn httpx \
            numpy scikit-learn statsmodels joblib pydantic

      - name: Syntax check — api.py
        run: python -m py_compile serving/api.py && echo "api.py OK"

      - name: Syntax check — closed_loop.py
        run: python -m py_compile automation/closed_loop.py && echo "closed_loop.py OK"

      - name: Syntax check — analyze_phase6.py
        run: python -m py_compile scripts/analyze_phase6.py && echo "analyze_phase6.py OK"

  # ── 2. Build & push Docker images ───────────────────────────────────────────
  build-and-push:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata — serving API
        id: meta-serving
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_SERVING }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push — serving API
        uses: docker/build-push-action@v5
        with:
          context: ./serving
          file:    ./serving/Dockerfile
          push:    true
          tags:    ${{ steps.meta-serving.outputs.tags }}
          labels:  ${{ steps.meta-serving.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Extract metadata — closed-loop
        id: meta-loop
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_LOOP }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push — closed-loop engine
        uses: docker/build-push-action@v5
        with:
          context: ./automation
          file:    ./automation/Dockerfile
          push:    true
          tags:    ${{ steps.meta-loop.outputs.tags }}
          labels:  ${{ steps.meta-loop.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 3. Smoke test — spin up API locally and hit /health ─────────────────────
  smoke-test:
    name: API Smoke Test
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --no-cache-dir \
            fastapi uvicorn httpx \
            numpy scikit-learn statsmodels joblib pydantic

      - name: Create stub model files for CI (no real pkl needed for /health)
        run: |
          mkdir -p /tmp/ci-models
          python3 - <<'EOF'
          import json, joblib, numpy as np
          from sklearn.ensemble import IsolationForest
          from sklearn.preprocessing import StandardScaler
          from sklearn.cluster import KMeans
          from sklearn.decomposition import PCA

          # Minimal models that load without error
          m = IsolationForest(n_estimators=10, random_state=42).fit(np.zeros((20,3)))
          sc = StandardScaler().fit(np.zeros((20,3)))
          joblib.dump(m,  '/tmp/ci-models/isolation_forest.pkl')
          joblib.dump(sc, '/tmp/ci-models/anomaly_scaler.pkl')
          json.dump({
            "model":"IsolationForest","threshold":0.6,"features":["cpu_upf","upf_replicas","cpu_mongodb"],
            "recall":0.9,"fpr":0.03,"precision":0.7,"f1":0.79
          }, open('/tmp/ci-models/anomaly_meta.json','w'))

          km = KMeans(n_clusters=2,n_init=5,random_state=42).fit(np.zeros((20,5)))
          sc2= StandardScaler().fit(np.zeros((20,19)))
          pca= PCA(n_components=5,random_state=42).fit(np.zeros((20,19)))
          joblib.dump(km,  '/tmp/ci-models/kmeans_model.pkl')
          joblib.dump(sc2, '/tmp/ci-models/cluster_scaler.pkl')
          joblib.dump(pca, '/tmp/ci-models/cluster_pca.pkl')
          json.dump({
            "model":"KMeans","k":2,"pca_components":5,"pca_variance_pct":75,"silhouette":0.503,
            "features":["cpu_amf","cpu_ausf","cpu_bsf","cpu_gnb","cpu_mongodb","cpu_nrf","cpu_nssf",
                        "cpu_pcf","cpu_scp","cpu_smf","cpu_udm","cpu_udr","cpu_ue","cpu_upf",
                        "upf_replicas","gtp_in_pps","gtp_out_pps","ran_ue_count","hpa_delta"],
            "cluster_states":{"0":"HIGH-LOAD","1":"IDLE"}
          }, open('/tmp/ci-models/clustering_meta.json','w'))

          from statsmodels.tsa.arima.model import ARIMA
          import warnings; warnings.filterwarnings('ignore')
          arima_fit = ARIMA(np.linspace(0,1,40), order=(3,0,1)).fit()
          joblib.dump(arima_fit, '/tmp/ci-models/arima_model.pkl')
          json.dump({
            "model":"ARIMA","order":[3,0,1],"mape_percent":3.64,
            "rmse":0.093,"mae":0.073,"train_samples":334,"test_samples":84
          }, open('/tmp/ci-models/arima_meta.json','w'))

          print("Stub models created OK")
          EOF

      - name: Start API server (background)
        run: |
          MODEL_DIR=/tmp/ci-models uvicorn serving.api:app \
            --host 127.0.0.1 --port 8000 &
          echo $! > /tmp/uvicorn.pid
          sleep 8

      - name: Smoke test — GET /health
        run: |
          curl -sf http://127.0.0.1:8000/health | python3 -m json.tool
          STATUS=$(curl -s http://127.0.0.1:8000/health | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          [ "$STATUS" = "ok" ] && echo "HEALTH OK" || (echo "HEALTH FAILED" && exit 1)

      - name: Smoke test — POST /predict/anomaly
        run: |
          RESULT=$(curl -sf -X POST http://127.0.0.1:8000/predict/anomaly \
            -H "Content-Type: application/json" \
            -d '{"cpu_upf": 95.0, "upf_replicas": 5, "cpu_amf": 40.0}')
          echo "$RESULT" | python3 -m json.tool
          echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'anomaly_score' in d"
          echo "ANOMALY ENDPOINT OK"

      - name: Smoke test — POST /predict/cluster
        run: |
          RESULT=$(curl -sf -X POST http://127.0.0.1:8000/predict/cluster \
            -H "Content-Type: application/json" \
            -d '{"cpu_upf": 20.0, "cpu_amf": 5.0, "upf_replicas": 1, "ue_count": 10}')
          echo "$RESULT" | python3 -m json.tool
          echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'cluster_name' in d"
          echo "CLUSTER ENDPOINT OK"

      - name: Stop API server
        run: kill $(cat /tmp/uvicorn.pid) 2>/dev/null || true

  # ── 4. Log deployment ────────────────────────────────────────────────────────
  log-deployment:
    name: Log Deployment Entry
    runs-on: ubuntu-latest
    needs: [build-and-push, smoke-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Append deployment log entry
        run: |
          mkdir -p docs
          ENTRY="| $(date -u '+%Y-%m-%d %H:%M UTC') | ${{ github.sha }} | ${{ github.actor }} | ${{ github.event.head_commit.message }} | ✅ Deployed |"
          echo "$ENTRY" >> docs/deployment_log.md
          head -5 docs/deployment_log.md || true
          tail -3 docs/deployment_log.md

      - name: Commit deployment log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/deployment_log.md
          git diff --cached --quiet || git commit -m "ci: log deployment $(date -u '+%Y-%m-%dT%H:%MZ') [skip ci]"
          git push
