---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-serving-api
  namespace: open5gs
  labels:
    app: ml-serving-api
    phase: "7"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-serving-api
  template:
    metadata:
      labels:
        app: ml-serving-api
    spec:
      containers:
        - name: serving-api
          image: 5g-serving-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: MODEL_DIR
              value: /models
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 25
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: ml-serving-api
  namespace: open5gs
  labels:
    app: ml-serving-api
spec:
  type: NodePort
  selector:
    app: ml-serving-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
      nodePort: 30800
