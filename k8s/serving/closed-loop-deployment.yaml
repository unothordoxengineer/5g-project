---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: closed-loop-sa
  namespace: open5gs

---
# RBAC: closed-loop engine may only scale the UPF deployment (resourceNames scoped)
# Tightened by security hardening — Phase 8 (k8s/security/rbac.yaml)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: closed-loop-role
  namespace: open5gs
  annotations:
    security.open5gs/last-reviewed: "2026-05-02"
    security.open5gs/reason: "Scoped to upf only — closed-loop engine must not patch other NF deployments"
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "update"]
    resourceNames: ["upf"]   # scoped: cannot patch smf, amf, or any other NF
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update"]
    resourceNames: ["upf"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: closed-loop-rolebinding
  namespace: open5gs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: closed-loop-role
subjects:
  - kind: ServiceAccount
    name: closed-loop-sa
    namespace: open5gs

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: closed-loop-engine
  namespace: open5gs
  labels:
    app: closed-loop-engine
    phase: "7"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: closed-loop-engine
  template:
    metadata:
      labels:
        app: closed-loop-engine
    spec:
      serviceAccountName: closed-loop-sa
      # Pin to open5gs-worker so the closed-loop engine is co-located with
      # ml-serving-api, avoiding cross-node pod-IP routing on KinD/Docker-Mac
      # where the Docker bridge drops NEW connections between nodes for pods
      # that lack active conntrack entries (known Docker-for-Mac limitation).
      nodeSelector:
        kubernetes.io/hostname: open5gs-worker
      containers:
        - name: closed-loop
          image: 5g-closed-loop:latest
          imagePullPolicy: Never
          env:
            - name: PROMETHEUS_URL
              value: "http://prometheus-prometheus.monitoring:9090"
            - name: SERVING_API_URL
              value: "http://ml-serving-api.open5gs:80"
            - name: POLL_INTERVAL_S
              value: "30"
            - name: NAMESPACE
              value: "open5gs"
            - name: DRY_RUN
              value: "false"
            - name: LOG_FILE
              value: "/logs/closed_loop.log"
          volumeMounts:
            - name: logs
              mountPath: /logs
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
      volumes:
        - name: logs
          emptyDir: {}
      restartPolicy: Always
