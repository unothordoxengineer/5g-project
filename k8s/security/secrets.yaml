# =============================================================================
# Secrets — Open5GS 5G Core
#
# IMPORTANT — Day-0 configuration:
#   Adding MongoDB authentication to a running unauthenticated instance
#   requires a data migration:
#     1. mongodump from running pod
#     2. Delete StatefulSet + PVC
#     3. Apply this Secret + updated StatefulSet
#     4. mongorestore to the new authenticated instance
#
#   For a fresh deployment, apply this file BEFORE 01-mongodb.yaml.
#
# Secret values are base64-encoded. To regenerate:
#   echo -n 'your-password' | base64
#
# In production: use Sealed Secrets, Vault, or SOPS to encrypt these at rest.
# =============================================================================

# -----------------------------------------------------------------------------
# MongoDB credentials
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-credentials
  namespace: open5gs
  labels:
    app: mongodb
    security.open5gs/type: database-credentials
  annotations:
    security.open5gs/rotation-policy: "90-day"
    security.open5gs/last-rotated: "2026-05-02"
type: Opaque
data:
  # Values: open5gs-admin / Open5GS@2026!
  # To regenerate: echo -n 'open5gs-admin' | base64
  MONGO_ROOT_USERNAME: b3BlbjVncy1hZG1pbg==
  # echo -n 'Open5GS@2026!' | base64
  MONGO_ROOT_PASSWORD: T3BlbjVHU0AyMDI2IQ==
  # Connection URI for NFs (with credentials)
  # mongodb://open5gs-admin:Open5GS@2026!@mongodb/open5gs?authSource=admin
  MONGO_URI: bW9uZ29kYjovL29wZW41Z3MtYWRtaW46T3BlbjVHU0AyMDI2IUBtb25nb2RiL29wZW41Z3M/YXV0aFNvdXJjZT1hZG1pbg==

---
# =============================================================================
# MongoDB StatefulSet — updated to consume credentials Secret
#
# Replace the existing 01-mongodb.yaml StatefulSet template.spec.containers
# section with this version to enable authentication.
# =============================================================================
# NOTE: This is a REFERENCE patch showing how to wire the Secret.
#       Apply carefully — see migration note above.
#
# The patch adds:
#   env:
#     - name: MONGO_INITDB_ROOT_USERNAME
#       valueFrom:
#         secretKeyRef:
#           name: mongodb-credentials
#           key: MONGO_ROOT_USERNAME
#     - name: MONGO_INITDB_ROOT_PASSWORD
#       valueFrom:
#         secretKeyRef:
#           name: mongodb-credentials
#           key: MONGO_ROOT_PASSWORD
#   command: ["mongod", "--auth", "--bind_ip_all"]
#
# After enabling auth, update UDR's db_uri to reference the secret:
#   db_uri: $(MONGO_URI)   # injected via envFrom: secretRef
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-credentials-patch-instructions
  namespace: open5gs
  annotations:
    security.open5gs/note: |
      To apply MongoDB authentication, patch the StatefulSet:
        kubectl patch statefulset mongodb -n open5gs --type=json -p='[
          {"op":"add","path":"/spec/template/spec/containers/0/env","value":[
            {"name":"MONGO_INITDB_ROOT_USERNAME","valueFrom":{"secretKeyRef":{"name":"mongodb-credentials","key":"MONGO_ROOT_USERNAME"}}},
            {"name":"MONGO_INITDB_ROOT_PASSWORD","valueFrom":{"secretKeyRef":{"name":"mongodb-credentials","key":"MONGO_ROOT_PASSWORD"}}}
          ]},
          {"op":"add","path":"/spec/template/spec/containers/0/args","value":["--auth","--bind_ip_all"]}
        ]'
type: Opaque
data: {}   # placeholder — carries only annotation metadata

---
# =============================================================================
# NRF API key — future use for NF identity tokens
# (placeholder for when mTLS/OAuth2 client credentials are implemented)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: nrf-api-key
  namespace: open5gs
  labels:
    app: nrf
    security.open5gs/type: api-key
  annotations:
    security.open5gs/purpose: "NRF OAuth2 client_credentials token signing key (future mTLS)"
    security.open5gs/status: "placeholder — not yet consumed by NRF"
type: Opaque
data:
  # 32-byte random hex key: openssl rand -hex 32 | base64
  NRF_SIGNING_KEY: ZjRhMWQ3YzJlOGI5ZjAzNDU2Nzg5YWJjZGVmMDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNk

---
# =============================================================================
# Subscriber init credentials — the job that seeds MongoDB
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: subscriber-init-credentials
  namespace: open5gs
  labels:
    security.open5gs/type: init-credentials
  annotations:
    security.open5gs/purpose: "Credentials for subscriber-init Job to authenticate against MongoDB"
type: Opaque
data:
  # Same as mongodb-credentials — separate secret so the Job has minimal access
  MONGO_URI: bW9uZ29kYjovL29wZW41Z3MtYWRtaW46T3BlbjVHU0AyMDI2IUBtb25nb2RiL29wZW41Z3M/YXV0aFNvdXJjZT1hZG1pbg==
