# subscriber-init Job needs token to talk to kube API? No — it only talks to
# MongoDB. Keep automount disabled.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: subscriber-init-sa
  namespace: open5gs
  labels:
    app: subscriber-init
automountServiceAccountToken: false

---
# =============================================================================
# Roles — minimal Kubernetes API permissions
# =============================================================================

# --- ConfigMap reader: all NFs need to read their own ConfigMap at startup ---
# NOTE: In this deployment NFs load configs via volumeMounts (Kubelet-mounted),
#       so they never call the API directly. This Role is defined as defence-
#       in-depth if a future NF version queries its own config via the API.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: configmap-reader
  namespace: open5gs
  annotations:
    security.open5gs/purpose: "Read-only access to own ConfigMap — defence in depth"
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]

---
# --- Secret reader: NFs that consume Secrets (UDR for MongoDB URI) ---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-reader
  namespace: open5gs
  annotations:
    security.open5gs/purpose: "Read own Secret (MongoDB URI) — UDR only"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["mongodb-credentials"]   # scoped to a single Secret

---
# --- UPF autoscaler (closed-loop engine): patch Deployment replicas ---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: upf-scaler
  namespace: open5gs
  annotations:
    security.open5gs/purpose: "Allows closed-loop ML engine to scale UPF replicas"
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch", "update"]
    resourceNames: ["upf"]   # scoped to UPF Deployment only
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update"]
    resourceNames: ["upf"]

---
# --- Pod status reader: closed-loop engine monitors pod health ---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: open5gs
  annotations:
    security.open5gs/purpose: "Read pod status for health monitoring — closed-loop engine"
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

---
# =============================================================================
# RoleBindings — attach Roles to ServiceAccounts
# =============================================================================

# All NF ServiceAccounts get configmap-reader (defence-in-depth, read-only)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
