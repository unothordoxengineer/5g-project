# =============================================================================
# RBAC — Role-Based Access Control for Open5GS 5G Core
#
# Principle of least privilege:
#   • Each NF gets its own ServiceAccount (pod identity isolation).
#   • NFs do NOT interact with the Kubernetes API — their ServiceAccounts
#     carry ZERO API permissions and have token automounting disabled.
#   • Only the subscriber-init Job and Prometheus need API access.
#   • The closed-loop engine (ML autoscaler) needs patch access to the UPF
#     Deployment — scoped to that single resource.
#
# ServiceAccount naming: <nf-name>-sa  (e.g. amf-sa, smf-sa)
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# ServiceAccounts — one per NF
# automountServiceAccountToken: false prevents kube-apiserver credentials
# from being injected into pods that never need them.
# ──────────────────────────────────────────────────────────────���──────────────

apiVersion: v1
kind: ServiceAccount
metadata:
  name: nrf-sa
  namespace: open5gs
  labels:
    app: nrf
    security.open5gs/role: service-account
automountServiceAccountToken: false
