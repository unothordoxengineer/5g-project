# =============================================================================
# AMF — Access and Mobility Management Function (Tier 5)
# Exposes port 38412/SCTP (N2 NGAP) so gNB can connect.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: amf-config
  namespace: open5gs
data:
  amf.yaml: |
    logger:
      level: info

    global:
      max:
        ue: 1024

    amf:
      sbi:
        server:
          - address: 0.0.0.0
            port: 80
            advertise: amf
        client:
          nrf:
            - uri: http://nrf
      ngap:
        server:
          - address: 0.0.0.0
      metrics:
        server:
          - address: 0.0.0.0
            port: 9090
      guami:
        - plmn_id:
            mcc: 999
            mnc: 70
          amf_id:
            region: 2
            set: 1
      tai:
        - plmn_id:
            mcc: 999
            mnc: 70
          tac: 1
      plmn_support:
        - plmn_id:
            mcc: 999
            mnc: 70
          s_nssai:
            - sst: 1    # Slice 1 — eMBB  (Enhanced Mobile Broadband)
            - sst: 2    # Slice 2 — mMTC  (Massive Machine-Type Communications / IoT)
            - sst: 3    # Slice 3 — URLLC (Ultra-Reliable Low-Latency Communications)
      security:
        integrity_order: [ NIA2, NIA1, NIA0 ]
        ciphering_order: [ NEA0, NEA1, NEA2 ]
      network_name:
        full: Open5GS
        short: Next
      amf_name: open5gs-amf0
      time:
        t3512:
          value: 540

    time:
      nf_instance:
        validity: 86400
        heartbeat: 60
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: amf
  namespace: open5gs
  labels:
    app: amf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: amf
  template:
    metadata:
      labels:
        app: amf
    spec:
      containers:
        - name: amf
          image: open5gs-amf:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
              name: sbi
            - containerPort: 38412
              protocol: SCTP
              name: ngap
            - containerPort: 9090
              name: metrics
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pgrep", "-x", "open5gs-amfd"]
            initialDelaySeconds: 15
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /etc/open5gs/amf.yaml
              subPath: amf.yaml
      volumes:
        - name: config
          configMap:
            name: amf-config
---
apiVersion: v1
kind: Service
metadata:
  name: amf
  namespace: open5gs
  labels:
    app: amf
spec:
  selector:
    app: amf
  ports:
    - name: sbi
      port: 80
      targetPort: 80
      protocol: TCP
    - name: ngap
      port: 38412
      targetPort: 38412
      protocol: SCTP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
