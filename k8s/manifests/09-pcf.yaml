# =============================================================================
# PCF — Policy Control Function (Tier 4)
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: pcf-config
  namespace: open5gs
data:
  pcf.yaml: |
    logger:
      level: info

    db_uri: mongodb://mongodb/open5gs

    global:
      max:
        ue: 1024

    pcf:
      sbi:
        server:
          - address: 0.0.0.0
            port: 80
            advertise: pcf
        client:
          nrf:
            - uri: http://nrf
      metrics:
        server:
          - address: 0.0.0.0
            port: 9090

    time:
      nf_instance:
        validity: 86400
        heartbeat: 60
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pcf
  namespace: open5gs
  labels:
    app: pcf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pcf
  template:
    metadata:
      labels:
        app: pcf
    spec:
      containers:
        - name: pcf
          image: open5gs-pcf:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
            - containerPort: 9090
              name: metrics
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/open5gs/pcf.yaml
              subPath: pcf.yaml
      volumes:
        - name: config
          configMap:
            name: pcf-config
---
apiVersion: v1
kind: Service
metadata:
  name: pcf
  namespace: open5gs
  labels:
    app: pcf
spec:
  selector:
    app: pcf
  ports:
    - name: sbi
      port: 80
      targetPort: 80
    - name: metrics
      port: 9090
      targetPort: 9090
