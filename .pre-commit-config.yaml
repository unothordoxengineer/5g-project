# =============================================================================
# pre-commit configuration — 5g-project
#
# Active: pre-commit + gitleaks are installed via Homebrew.
# Hook is registered at .git/hooks/pre-commit via: pre-commit install
#
# Run manually on all files: pre-commit run --all-files
# Update hook revisions:     pre-commit autoupdate
# =============================================================================

repos:
  # ── gitleaks: high-signal secret detection (300+ entropy + pattern rules) ──
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        name: gitleaks (secret scanner)
        description: Detect hardcoded secrets using Entropy + Regex

  # ── Basic hygiene ──────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
        args: [--unsafe]   # allow custom YAML tags (K8s uses !!binary etc.)
      - id: end-of-file-fixer
        exclude: '\.png$|\.pkl$|\.csv$'
      - id: trailing-whitespace
        exclude: '\.md$|\.png$|\.pkl$|\.csv$'
      - id: detect-private-key   # catches PEM headers not caught by gitleaks
