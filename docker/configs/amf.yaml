logger:
  level: info

global:
  max:
    ue: 1024

amf:
  sbi:
    server:
      - address: 0.0.0.0
        port: 80
        advertise: amf
    client:
      nrf:
        - uri: http://nrf
  ngap:
    server:
      - address: 0.0.0.0
  metrics:
    server:
      - address: 0.0.0.0
        port: 9090
  guami:
    - plmn_id:
        mcc: 999
        mnc: 70
      amf_id:
        region: 2
        set: 1
  tai:
    - plmn_id:
        mcc: 999
        mnc: 70
      tac: 1
  plmn_support:
    - plmn_id:
        mcc: 999
        mnc: 70
      s_nssai:
        - sst: 1    # Slice 1 — eMBB  (Enhanced Mobile Broadband)
        - sst: 2    # Slice 2 — mMTC  (Massive Machine-Type Communications / IoT)
        - sst: 3    # Slice 3 — URLLC (Ultra-Reliable Low-Latency Communications)
  security:
    integrity_order: [ NIA2, NIA1, NIA0 ]
    ciphering_order: [ NEA0, NEA1, NEA2 ]
  network_name:
    full: Open5GS
    short: Next
  amf_name: open5gs-amf0
  time:
    t3512:
      value: 540

time:
  nf_instance:
    validity: 86400
    heartbeat: 60
