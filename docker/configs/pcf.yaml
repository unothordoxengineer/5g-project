logger:
  level: info

db_uri: mongodb://mongodb/open5gs

global:
  max:
    ue: 1024

pcf:
  sbi:
    server:
      - address: 0.0.0.0
        port: 80
        advertise: pcf
    client:
      nrf:
        - uri: http://nrf
  metrics:
    server:
      - address: 0.0.0.0
        port: 9090

time:
  nf_instance:
    validity: 86400
    heartbeat: 60
